name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --non-interactive
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test
      - run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
